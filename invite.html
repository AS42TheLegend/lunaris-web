<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNARIS SMP | PRESTIGE ACCESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #6e00ff;
            --dark-bg: #030305;
        }

        /* Dark Moving Background with Stars */
        body {
            background: radial-gradient(circle at center, #080112 0%, #030305 100%);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* The Moving Small Stars */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2;
            z-index: 0;
            animation: starMove 150s linear infinite;
        }

        @keyframes starMove {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        .container {
            position: relative;
            max-width: 600px;
            width: 85%;
            text-align: center;
            padding: 60px 40px;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
            z-index: 2;
        }

        /* Breathing Zoom Title */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 12px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: breathingZoom 5s ease-in-out infinite;
        }

        @keyframes breathingZoom {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--primary)); }
            50% { transform: scale(1.06); filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.3)); }
        }

        .subtitle {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.7rem;
            color: var(--primary);
            margin-top: 10px;
            margin-bottom: 50px;
            letter-spacing: 6px;
            opacity: 0.6;
        }

        /* Feature Grid */
        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
            text-align: left;
        }

        .feature {
            padding: 15px;
            border-left: 2px solid var(--secondary);
            background: rgba(255,255,255,0.03);
            border-radius: 0 10px 10px 0;
            transition: 0.3s;
        }

        .feature:hover {
            background: rgba(110, 0, 255, 0.1);
            transform: translateX(5px);
        }

        .feature h3 { margin: 0; font-size: 0.8rem; color: var(--primary); text-transform: uppercase; }
        .feature p { margin: 5px 0 0; font-size: 0.85rem; color: #bbb; line-height: 1.4; }

        /* Inputs and Form */
        form { position: relative; }
        input {
            width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 15px;
            border: 1px solid #222; background: #000; color: white;
            font-size: 1rem; box-sizing: border-box; transition: 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }

        .cta-button {
            width: 100%; padding: 22px; margin-top: 10px;
            background: #fff; color: #000; border: none; border-radius: 15px;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.1rem;
            cursor: pointer; transition: 0.4s; text-transform: uppercase;
        }

        .cta-button:hover { background: var(--primary); box-shadow: 0 0 30px var(--primary); }

        /* Subtle Bottom Credit */
        .credit {
            position: absolute;
            bottom: 20px;
            right: 25px;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.15);
            letter-spacing: 1px;
            font-family: 'Syncopate', sans-serif;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="stars"></div>

<div class="container animate__animated animate__fadeInUp">

    <p class="subtitle">PREMIUM SMP ARCHITECTURE</p>

    <div class="feature-grid">
        <div class="feature animate__animated animate__fadeInLeft animate__delay-1s">
            <h3>SIMD Engine</h3>
            <p>Vector-accelerated loading for zero stutter.</p>
        </div>
        <div class="feature animate__animated animate__fadeInRight animate__delay-1s">
            <h3>Elite AI</h3>
            <p>Smart entity management keeps TPS at 20.0.</p>
        </div>
        <div class="feature animate__animated animate__fadeInLeft animate__delay-2s">
            <h3>Mesh-VPN</h3>
            <p>Encrypted peer-to-peer zero-lag connection.</p>
        </div>
        <div class="feature animate__animated animate__fadeInRight animate__delay-2s">
            <h3>Vanilla+</h3>
            <p>Unbridled performance with pure gameplay.</p>
        </div>
    </div>

    <form action="https://formsubmit.co/lunarismc@outlook.com" method="POST" class="animate__animated animate__fadeInUp animate__delay-3s">
        <input type="hidden" name="_next" value="https://lunaris-web.pages.dev/success.html">
        <input type="hidden" name="_subject" value="LUNARIS: New Prestige Applicant">
        <input type="hidden" name="_captcha" value="false">

        <input type="text" name="name" placeholder="NAME" required>
        <input type="email" name="email" placeholder="MAIL" required>
        
        <button type="submit" class="cta-button">CLAIM SEAT</button>
    </form>
</div>

<div class="credit">By Abhay Singh</div>

</body>

</html>
