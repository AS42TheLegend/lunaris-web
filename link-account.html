<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNARIS | LINK IDENTITY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --bg: #030305; }
        body { 
            background: radial-gradient(circle at center, #080112 0%, #030305 100%);
            color: white; font-family: 'Roboto', sans-serif; margin: 0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow: hidden;
        }

        .stars { position: fixed; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.15; z-index: -1; animation: starMove 200s linear infinite; }
        @keyframes starMove { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        .auth-card {
            background: rgba(0, 0, 0, 0.8); padding: 40px; border-radius: 30px;
            border: 1px solid var(--primary); backdrop-filter: blur(20px);
            width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
        }

        h2 { font-family: 'Orbitron', sans-serif; color: var(--primary); letter-spacing: 2px; margin-bottom: 10px; }
        p { font-size: 0.85rem; color: #aaa; line-height: 1.5; margin-bottom: 25px; }

        .input-group { text-align: left; }
        label { font-size: 0.65rem; color: var(--primary); font-family: 'Orbitron', sans-serif; margin-left: 5px; text-transform: uppercase; }

        input {
            width: 100%; padding: 14px; margin: 8px 0 20px 0;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; box-sizing: border-box;
            font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; background: rgba(0, 242, 255, 0.08); }

        .btn {
            width: 100%; padding: 16px; background: white; color: black;
            border: none; border-radius: 12px; font-family: 'Orbitron', sans-serif;
            font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover { background: var(--primary); box-shadow: 0 0 25px var(--primary); transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="auth-card animate__animated animate__zoomIn">
        <h2>LINK IDENTITY</h2>
        <p>Your Google session is verified. Please provide your Minecraft in-game name to synchronize your archive.</p>
        
        <div class="input-group">
            <label>Minecraft Username</label>
            <input type="text" id="mc-name" placeholder="e.g. Dream" required autocomplete="off">
        </div>

        <button class="btn" id="finish-btn" onclick="saveAndProceed()">Complete Sync</button>
    </div>

    

    <script>
        function saveAndProceed() {
            const nameField = document.getElementById('mc-name');
            const finishBtn = document.getElementById('finish-btn');
            const name = nameField.value.trim();

            if(name.length < 3) {
                alert("Please enter a valid Minecraft username.");
                return;
            }

            // Update UI to show processing
            finishBtn.disabled = true;
            finishBtn.innerText = "Synchronizing...";

            // Save to Local Storage
            localStorage.setItem('lunaris_mc_name', name);
            
            // Short delay for "high-tech" feel before redirect
            setTimeout(() => {
                window.location.href = "joinlink.html";
            }, 800);
        }

        // Allow pressing "Enter" to submit
        document.getElementById('mc-name').addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                saveAndProceed();
            }
        });
    </script>
</body>
</html>
