<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNARIS | CREATE ARCHIVE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --secondary: #6e00ff; --bg: #030305; }
        body { 
            background: radial-gradient(circle at center, #080112 0%, #030305 100%);
            color: white; font-family: 'Roboto', sans-serif; margin: 0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }
        
        .stars { position: fixed; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.15; z-index: -1; animation: starMove 200s linear infinite; }
        @keyframes starMove { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        .auth-card {
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 { font-family: 'Orbitron', sans-serif; letter-spacing: 4px; color: var(--primary); margin-bottom: 30px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 0.7rem; color: var(--primary); font-family: 'Orbitron', sans-serif; margin-left: 5px; }
        
        input {
            width: 100%; padding: 12px 15px; margin-top: 5px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: white; font-size: 0.9rem; box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; background: rgba(0, 242, 255, 0.05); }

        .btn-submit {
            width: 100%; padding: 15px; margin-top: 20px;
            background: white; color: black; border: none; border-radius: 10px;
            font-family: 'Orbitron', sans-serif; font-weight: 900; cursor: pointer;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-submit:hover { background: var(--primary); box-shadow: 0 0 20px var(--primary); transform: translateY(-2px); }

        .divider { margin: 30px 0; border-bottom: 1px solid rgba(255,255,255,0.1); position: relative; }
        .divider span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #080112; padding: 0 15px; font-size: 0.7rem; color: #555; }

        .social-container { display: flex; justify-content: center; }
        .social-btn {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: white; font-size: 0.8rem; font-family: 'Orbitron', sans-serif; 
            cursor: pointer; transition: 0.3s; text-decoration: none; display: flex; align-items: center; justify-content: center;
        }
        .social-btn:hover { background: var(--primary); color: black; border-color: white; }

        .login-link { margin-top: 25px; font-size: 0.8rem; color: #777; }
        .login-link a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="stars"></div>

<div class="auth-card animate__animated animate__zoomIn">
    <h2>INITIALIZE ARCHIVE</h2>
    
    <form id="signup-form">
        <div class="input-group">
            <label>MINECRAFT USERNAME</label>
            <input type="text" id="username" placeholder="e.g. Steve_Lunaris" required>
        </div>
        <div class="input-group">
            <label>EMAIL ADDRESS</label>
            <input type="email" id="email" placeholder="mail@example.com" required>
        </div>
        <div class="input-group">
            <label>PASSWORD</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <div class="input-group">
            <label>CONFIRM PASSWORD</label>
            <input type="password" id="confirm-password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-submit">CREATE ACCOUNT</button>
    </form>

    <div class="divider">
        <span>OR</span>
    </div>

    <div class="social-container">
        <button class="social-btn" id="google-login">SIGN IN WITH GOOGLE</button>
    </div>

    <p class="login-link">Already have an archive? <a href="1.html">LOGIN</a></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { 
    getAuth, 
    GoogleAuthProvider, 
    signInWithPopup, 
    createUserWithEmailAndPassword 
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // Your Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyA-EUalXIPLZ2BPtuATcbTfgk4meQt58GY",
    authDomain: "lunaris-af69a.firebaseapp.com",
    projectId: "lunaris-af69a",
    storageBucket: "lunaris-af69a.firebasestorage.app",
    messagingSenderId: "88525957564",
    appId: "1:88525957564:web:a56377cbd412e0f63fa3b9",
    measurementId: "G-Q1C0T35DM2"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

// Handle Google Sign-In with "Double-Click Protection"
const googleBtn = document.getElementById('google-login');

googleBtn.onclick = () => {
    // Disable the button so it can't be clicked again immediately
    googleBtn.disabled = true;
    googleBtn.innerText = "INITIALIZING...";
    googleBtn.style.opacity = "0.5";

    const provider = new GoogleAuthProvider();
    
    signInWithPopup(auth, provider)
      .then((result) => {
        window.location.href = "2.html"; 
      })
      .catch((error) => {
        // Re-enable the button if there's an error so they can try again
        googleBtn.disabled = false;
        googleBtn.innerText = "SIGN IN WITH GOOGLE";
        googleBtn.style.opacity = "1";

        if (error.code === 'auth/cancelled-popup-request') {
            console.log("A popup request was already pending. Please finish the open window.");
        } else if (error.code === 'auth/popup-closed-by-user') {
            alert("Login cancelled. Please keep the window open to sign in.");
        } else {
            alert("Auth Error: " + error.message);
        }
      });
};
</script>

</body>
</html>
