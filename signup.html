<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNARIS | CREATE AN ACCOUNT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --secondary: #6e00ff; --bg: #030305; --error: #ff3e3e; }
        body { 
            background: radial-gradient(circle at center, #080112 0%, #030305 100%);
            color: white; font-family: 'Roboto', sans-serif; margin: 0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }
        
        .stars { position: fixed; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/stardust.png'); opacity: 0.15; z-index: -1; animation: starMove 200s linear infinite; }
        @keyframes starMove { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        .auth-card {
            background: rgba(0, 0, 0, 0.8); padding: 40px; border-radius: 30px;
            border: 1px solid rgba(0, 242, 255, 0.1); backdrop-filter: blur(20px);
            width: 100%; max-width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center;
        }

        h2 { font-family: 'Orbitron', sans-serif; letter-spacing: 4px; color: var(--primary); margin-bottom: 30px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 0.7rem; color: var(--primary); font-family: 'Orbitron', sans-serif; margin-left: 5px; }
        
        input {
            width: 100%; padding: 12px 15px; margin-top: 5px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: white; font-size: 0.9rem; box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; background: rgba(0, 242, 255, 0.05); }

        /* Decrypt Mask / Show Password */
        .show-pass-container {
            display: flex; align-items: center; margin-top: 8px; cursor: pointer; width: fit-content;
        }
        .show-pass-container input[type="checkbox"] { width: auto; margin: 0 8px 0 5px; cursor: pointer; }
        .show-pass-label { font-size: 0.65rem; color: #777; font-family: 'Orbitron', sans-serif; text-transform: uppercase; }

        /* Error Terminal */
        #error-terminal {
            display: none; background: rgba(255, 62, 62, 0.1); border: 1px solid var(--error);
            color: var(--error); font-size: 0.75rem; padding: 12px; border-radius: 10px;
            margin-bottom: 20px; font-family: monospace; text-align: left;
        }

        .btn-submit {
            width: 100%; padding: 15px; margin-top: 20px;
            background: white; color: black; border: none; border-radius: 10px;
            font-family: 'Orbitron', sans-serif; font-weight: 900; cursor: pointer;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn-submit:hover { background: var(--primary); box-shadow: 0 0 20px var(--primary); transform: translateY(-2px); }

        .divider { margin: 30px 0; border-bottom: 1px solid rgba(255,255,255,0.1); position: relative; }
        .divider span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #080112; padding: 0 15px; font-size: 0.7rem; color: #555; }

        .social-btn {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: white; font-size: 0.8rem; font-family: 'Orbitron', sans-serif; 
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .social-btn:hover { background: var(--primary); color: black; }

        .login-link { margin-top: 25px; font-size: 0.8rem; color: #777; }
        .login-link a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="stars"></div>

<div class="auth-card animate__animated animate__zoomIn">
    <h2>INITIALIZE ARCHIVE</h2>
    
    <div id="error-terminal"></div>

    <form id="signup-form">
        <div class="input-group">
            <label>MINECRAFT USERNAME</label>
            <input type="text" id="username" placeholder="e.g. Steve_Lunaris" required>
        </div>
        <div class="input-group">
            <label>EMAIL ADDRESS</label>
            <input type="email" id="email" placeholder="mail@example.com" required>
        </div>
        <div class="input-group">
            <label>PASSWORD</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <div class="input-group">
            <label>CONFIRM PASSWORD</label>
            <input type="password" id="confirm-password" placeholder="••••••••" required>
            
            <div class="show-pass-container" onclick="togglePasswords()">
                <input type="checkbox" id="check-pass">
                <span class="show-pass-label">DECRYPT MASKS</span>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="signup-btn">CREATE ACCOUNT</button>
    </form>

    <div class="divider"><span>OR</span></div>

    <div class="social-container">
        <button class="social-btn" id="google-login">SIGN IN WITH GOOGLE</button>
    </div>

    <p class="login-link">Already have an archive? <a href="login.html">LOGIN</a></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { 
    getAuth, 
    GoogleAuthProvider, 
    signInWithPopup, 
    createUserWithEmailAndPassword 
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA-EUalXIPLZ2BPtuATcbTfgk4meQt58GY",
    authDomain: "lunaris-af69a.firebaseapp.com",
    projectId: "lunaris-af69a",
    storageBucket: "lunaris-af69a.firebasestorage.app",
    messagingSenderId: "88525957564",
    appId: "1:88525957564:web:a56377cbd412e0f63fa3b9",
    measurementId: "G-Q1C0T35DM2"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const errorBox = document.getElementById('error-terminal');

  function showError(msg) {
      errorBox.innerText = "> SYSTEM_ERROR: " + msg;
      errorBox.style.display = 'block';
      errorBox.classList.add('animate__animated', 'animate__shakeX');
      setTimeout(() => errorBox.classList.remove('animate__shakeX'), 500);
  }

  // --- SHOW PASSWORD TOGGLE ---
  window.togglePasswords = () => {
      const p1 = document.getElementById('password');
      const p2 = document.getElementById('confirm-password');
      const check = document.getElementById('check-pass');
      
      const type = p1.type === "password" ? "text" : "password";
      p1.type = type;
      p2.type = type;
      check.checked = (type === "text");
  };

  // --- GOOGLE SIGN-IN LOGIC ---
  const googleBtn = document.getElementById('google-login');
  googleBtn.onclick = () => {
    googleBtn.disabled = true;
    errorBox.style.display = 'none';
    const provider = new GoogleAuthProvider();
    signInWithPopup(auth, provider)
      .then((result) => {
        const isNewUser = result._tokenResponse.isNewUser;
        const existingName = localStorage.getItem('lunaris_mc_name');
        if (isNewUser || !existingName) {
            window.location.href = "link-account.html";
        } else {
            window.location.href = "joinlink.html";
        }
      })
      .catch((error) => {
        googleBtn.disabled = false;
        showError(error.message);
      });
  };

  // --- MANUAL SIGNUP LOGIC ---
  const signupForm = document.getElementById('signup-form');
  signupForm.onsubmit = (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';

    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const confirmPass = document.getElementById('confirm-password').value;

    if (pass !== confirmPass) {
        showError("PASSWORDS_DO_NOT_MATCH");
        return;
    }

    if (pass.length < 6) {
        showError("ENCRYPTION_TOO_WEAK_MIN_6_CHARS");
        return;
    }

    createUserWithEmailAndPassword(auth, email, pass)
      .then(() => {
          localStorage.setItem('lunaris_mc_name', username);
          window.location.href = "joinlink.html";
      })
      .catch((error) => {
          showError(error.code.replace('auth/', '').toUpperCase());
      });
  };
</script>

</body>
</html>
